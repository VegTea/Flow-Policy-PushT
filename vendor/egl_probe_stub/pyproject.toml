[build-system]
requires = ["setuptools==65.5.0", "wheel==0.38.4"]
build-backend = "setuptools.build_meta"

[project]
name = "egl-probe"
version = "1.0.2"
description = "No-build EGL probe compatibility package for PushT training"
requires-python = ">=3.9"

[tool.setuptools.packages.find]
include = ["egl_probe*"]
